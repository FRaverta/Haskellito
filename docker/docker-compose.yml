# Haskellito Local Development Environment
# Usage: from repo root: docker compose -f docker/docker-compose.yml up
# Frontend: http://localhost:5173
# Backend API: http://localhost:8001

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      # Mount backend for hot reload during development
      - ../backend:/app:ro
    environment:
      - PYTHONUNBUFFERED=1
      - COGNITO_AUTH_ENABLED=true
      - COGNITO_REGION=us-east-1
      - COGNITO_USER_POOL_ID=us-east-1_dwg2mt4BF
      - COGNITO_APP_CLIENT_ID=3akv2gdc854btlb5g6057bf67j
    # Security restrictions for GHCi sandboxing
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777,exec
    shm_size: '256m'
    # Resource limits to prevent abuse
    # Each GHCi session uses ~150-250MB RAM. Adjust based on expected concurrent users.
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://backend:8001
      - VITE_AUTH_ENABLED=true
      - VITE_COGNITO_DOMAIN=https://us-east-1dwg2mt4bf.auth.us-east-1.amazoncognito.com
      - VITE_COGNITO_APP_CLIENT_ID=3akv2gdc854btlb5g6057bf67j
      - VITE_COGNITO_REDIRECT_URI=http://localhost:5173/auth/callback
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
